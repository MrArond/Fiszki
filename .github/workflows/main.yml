name: Test project

on: 
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs: 
  after_merge:
    if: github.event.pull_request.merged == true
    environment: dev
    runs-on: ubuntu-latest

    env:
      HOST: ${{ secrets.DEPLOY_HOST }}
      USER: ${{ vars.DEPLOY_USER }}
      PASSWORD: ${{ vars.DEPLOY_PASSWORD }}
      PORT: ${{ secrets.DEPLOY_PORT }}

    steps:

        - name: SSH connection
          uses: appleboy/ssh-action@v1
          with:
            host: "HOST"
            username: "USER"
            password: "PASSWORD"
            port: "PORT"
            script: whoami

          

    
