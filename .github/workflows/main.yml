name: Test project

on: 
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs: 
  after_merge:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    environment: dev
    runs-on: ubuntu-latest

    env:
      HOST: ${{ vars.HOST }}
      USER: ${{ vars.DEPLOY_USER }}
      PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
      PORT: ${{ vars.PORT }}
    steps:
      - name: SSH connection
        run: |
          sshpass -p "$PASSWORD" ssh -o StrictHostKeyChecking=no -p "$PORT" "$DEPLOY_USER@$HOST"

          

    
